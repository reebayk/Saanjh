<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tweek – Weekly Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f7f7f5; color: #1a1a1a; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Navbar ── */
    .navbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; background: #fff; border-bottom: 1px solid #e8e8e6; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 20px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.5px; }
    .nav-center { display: flex; align-items: center; gap: 8px; }
    .week-label { font-size: 13px; font-weight: 500; color: #555; min-width: 160px; text-align: center; }
    .nav-btn { background: none; border: 1px solid #e0e0dc; border-radius: 6px; padding: 4px 10px; font-size: 13px; cursor: pointer; color: #444; transition: background 0.15s; }
    .nav-btn:hover { background: #f0f0ed; }
    .today-btn { font-size: 12px; font-weight: 500; }
    .icon-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #666; padding: 4px 8px; }

    /* ── Planner Layout ── */
    .planner { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .days-grid { display: flex; flex: 1; overflow-x: auto; }

    /* ── Day Column ── */
    .day-col { flex: 1; min-width: 120px; border-right: 1px solid #e8e8e6; display: flex; flex-direction: column; background: #fff; transition: background 0.2s; }
    .day-col:last-child { border-right: none; }
    .day-col.today { background: #fffdf5; }
    .col-header { padding: 12px 14px 10px; border-bottom: 1px solid #e8e8e6; position: sticky; top: 0; background: inherit; z-index: 10; }
    .day-name { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.6px; }
    .day-date { font-size: 22px; font-weight: 300; color: #1a1a1a; margin-top: 2px; }
    .day-col.today .day-date { color: #f0a500; font-weight: 500; }
    .tasks-container { flex: 1; overflow-y: auto; padding: 8px 0; }

    /* ── Task Item ── */
    .task-item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 14px; cursor: pointer; }
    .task-item:hover { background: #f7f7f5; }
    .task-check { width: 15px; height: 15px; border: 1.5px solid #ccc; border-radius: 50%; flex-shrink: 0; margin-top: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, background 0.2s; }
    .task-check.done { border-color: #bbb; background: #bbb; }
    .task-check.done::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff; }
    .task-text { font-size: 13px; color: #333; line-height: 1.5; flex: 1; outline: none; border: none; background: transparent; cursor: text; }
    .task-text.done { text-decoration: line-through; color: #aaa; }

    /* ── Task Input Row ── */
    .task-input-row { padding: 5px 14px; }
    .task-input { width: 100%; border: none; background: transparent; font-size: 13px; color: #aaa; outline: none; }
    .task-input::placeholder { color: #ccc; }

    /* ── Someday Section ── */
    .someday-col { background: #fafaf8; border-top: 1px solid #e8e8e6; padding: 10px 14px; }
    .someday-col h3 { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    
    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ── Drag over highlight ── */
    .day-col.drag-over { background: #f0f5ff; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-left"><div class="logo">tweek</div></div>
    <div class="nav-center">
      <button class="nav-btn" id="prevWeek">&#8592;</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="nav-btn" id="nextWeek">&#8594;</button>
      <button class="nav-btn today-btn" id="todayBtn">Today</button>
    </div>
    <div class="nav-right"><button class="icon-btn">☰</button></div>
  </header>

  <!-- Planner -->
  <main class="planner">
    <div class="days-grid" id="daysGrid"></div>

    <!-- Someday at bottom -->
    <div class="someday-col">
      <h3>Someday</h3>
      <div class="tasks-container" id="somedayTasks">
        <div class="task-input-row">
          <input type="text" class="task-input" placeholder="+ Add task" onkeydown="addSomedayTask(event, this)" />
        </div>
      </div>
    </div>
  </main>

  <script>
    let currentWeekOffset = 0;
    let tasks = JSON.parse(localStorage.getItem('tweek_tasks') || '{}');
    let somedayTasks = JSON.parse(localStorage.getItem('tweek_someday') || '[]');

    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function getWeekStart(offset=0){
      const now = new Date();
      const day = now.getDay();
      const diff = now.getDate() - day + offset*7;
      const start = new Date(now); start.setDate(diff); start.setHours(0,0,0,0);
      return start;
    }

    function formatDateKey(date){ return date.toISOString().split('T')[0]; }
    function formatWeekLabel(start){
      const end = new Date(start); end.setDate(end.getDate()+6);
      const opts = {month:'short',day:'numeric'};
      return `${start.toLocaleDateString('en-US',opts)} – ${end.toLocaleDateString('en-US',opts)}, ${end.getFullYear()}`;
    }
    function isToday(date){ return date.toDateString()===new Date().toDateString(); }
    function saveTasks(){ localStorage.setItem('tweek_tasks', JSON.stringify(tasks)); }
    function saveSomeday(){ localStorage.setItem('tweek_someday', JSON.stringify(somedayTasks)); }

    function renderWeek(){
      const grid = document.getElementById('daysGrid');
      const weekStart = getWeekStart(currentWeekOffset);
      document.getElementById('weekLabel').textContent = formatWeekLabel(weekStart);
      grid.innerHTML = '';

      for(let i=0;i<7;i++){
        const date=new Date(weekStart); date.setDate(weekStart.getDate()+i);
        const key=formatDateKey(date);
        const col=document.createElement('div'); col.className='day-col'+(isToday(date)?' today':''); col.dataset.key=key;
        col.innerHTML=`
          <div class="col-header">
            <div class="day-name">${DAYS[date.getDay()]}</div>
            <div class="day-date">${date.getDate()}</div>
          </div>
          <div class="tasks-container" id="tasks-${key}">
            <div class="task-input-row">
              <input type="text" class="task-input" placeholder="+ Add task"
                onkeydown="addTask(event,this,'${key}')"/>
            </div>
          </div>`;
        col.addEventListener('dragover',e=>{ e.preventDefault(); col.classList.add('drag-over'); });
        col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
        col.addEventListener('drop', e=>{
          col.classList.remove('drag-over');
          const data=JSON.parse(e.dataTransfer.getData('text/plain'));
          moveTask(data.fromKey,data.index,key);
        });
        grid.appendChild(col);
        if(tasks[key]) tasks[key].forEach((t,idx)=>renderTask(key,t,idx));
      }
    }

    function renderTask(key, task, index){
      const container=document.getElementById(`tasks-${key}`);
      if(!container) return;
      const inputRow=container.querySelector('.task-input-row');
      const item=document.createElement('div'); item.className='task-item'; item.draggable=true; item.dataset.index=index;
      item.innerHTML=`
        <div class="task-check ${task.done?'done':''}" onclick="toggleTask('${key}',${index},this)"></div>
        <div class="task-text ${task.done?'done':''}" contenteditable="true" spellcheck="false"
          onblur="editTask('${key}',${index},this)">${task.text}</div>`;
      item.addEventListener('dragstart', e=>{
        e.dataTransfer.setData('text/plain', JSON.stringify({fromKey:key,index}));
      });
      container.insertBefore(item,inputRow);
    }

    function addTask(e,input,key){
      if(e.key!=='Enter') return;
      const text=input.value.trim(); if(!text) return;
      if(!tasks[key]) tasks[key]=[];
      const index=tasks[key].length; tasks[key].push({text,done:false});
      saveTasks(); renderTask(key,{text,done:false},index); input.value='';
    }

    function toggleTask(key,index,el){
      tasks[key][index].done=!tasks[key][index].done; saveTasks();
      el.classList.toggle('done',tasks[key][index].done);
      el.nextElementSibling.classList.toggle('done',tasks[key][index].done);
    }

    function editTask(key,index,el){
      const text=el.innerText.trim();
      if(!text){ tasks[key].splice(index,1); saveTasks(); renderWeek(); return; }
      tasks[key][index].text=text; saveTasks();
    }

    function taskKeydown(e,key,index){
      if(e.key==='Enter'){ e.preventDefault(); document.getElementById(`tasks-${key}`).querySelector('.task-input').focus(); }
      if(e.key==='Backspace' && e.target.innerText===''){ tasks[key].splice(index,1); saveTasks(); renderWeek(); }
    }

    function moveTask(fromKey,fromIndex,toKey){
      if(!tasks[fromKey]) return;
      const [t]=tasks[fromKey].splice(fromIndex,1);
      if(!tasks[toKey]) tasks[toKey]=[];
      tasks[toKey].push(t); saveTasks(); renderWeek();
    }

    function addSomedayTask(e,input){
      if(e.key!=='Enter') return;
      const text=input.value.trim(); if(!text) return;
      somedayTasks.push({text,done:false}); saveSomeday(); renderSomeday(); input.value='';
    }

    function renderSomeday(){
      const container=document.getElementById('somedayTasks'); container.innerHTML=`
        <div class="task-input-row">
          <input type="text" class="task-input" placeholder="+ Add task" onkeydown="addSomedayTask(event,this)" />
        </div>`;
      somedayTasks.forEach((task,idx)=>{
        const inputRow=container.querySelector('.task-input-row');
        const item=document.createElement('div'); item.className='task-item';
        item.innerHTML=`
          <div class="task-check ${task.done?'done':''}" onclick="toggleSomeday(${idx},this)"></div>
          <div class="task-text ${task.done?'done':''}" contenteditable="true" spellcheck="false"
            onblur="editSomeday(${idx},this)">${task.text}</div>`;
        container.insertBefore(item,inputRow);
      });
    }

    function toggleSomeday(idx,el){ somedayTasks[idx].done=!somedayTasks[idx].done; saveSomeday(); el.classList.toggle('done',somedayTasks[idx].done); el.nextElementSibling.classList.toggle('done',somedayTasks[idx].done);}
    function editSomeday(idx,el){ const text=el.innerText.trim(); if(!text){ somedayTasks.splice(idx,1); saveSomeday(); renderSomeday(); return; } somedayTasks[idx].text=text; saveSomeday(); }

    document.getElementById('prevWeek').addEventListener('click',()=>{currentWeekOffset--;renderWeek();});
    document.getElementById('nextWeek').addEventListener('click',()=>{currentWeekOffset++;renderWeek();});
    document.getElementById('todayBtn').addEventListener('click',()=>{currentWeekOffset=0;renderWeek();});

    renderWeek(); renderSomeday();
  </script>
</body>
</html>
